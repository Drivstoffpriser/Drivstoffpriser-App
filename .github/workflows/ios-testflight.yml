name: iOS TestFlight Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  ios-testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Fastlane
        run: gem install fastlane

      # 🔐 Signing
      - name: Setup signing
        env:
          DIST_CERT: ${{ secrets.DIST_CERTIFICATE_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$DIST_CERT" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision
          UUID=$(grep -a -A1 UUID profile.mobileprovision | grep -io "[-A-F0-9]\{36\}")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # 🏗 Build iOS
      - name: Prepare iOS build
        run: flutter build ios --release --no-codesign

      # 🚀 Fastlane TestFlight
      - name: Run Fastlane (TestFlight)
        working-directory: ios
        env:
          GITHUB_TAG: ${{ github.event.release.tag_name }}
          APP_STORE_CONNECT_API_KEY_JSON: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON }}
        run: fastlane beta