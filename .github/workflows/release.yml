name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build number
        id: build_number
        run: |
          # Get the highest build number from existing tags (v*+N)
          LATEST=$(git tag -l 'v*+*' | sed 's/.*+//' | sort -n | tail -1)
          NEXT=$(( ${LATEST:-0} + 1 ))
          echo "value=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Build number: $NEXT (previous: ${LATEST:-none})"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ github.workspace }}/android/app/upload-keystore.jks
          EOF

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Create firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Build APK
        run: flutter build apk --release --build-name=${{ inputs.version }} --build-number=${{ steps.build_number.outputs.value }} --dart-define=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build AAB
        run: flutter build appbundle --release --build-name=${{ inputs.version }} --build-number=${{ steps.build_number.outputs.value }} --dart-define=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}+${{ steps.build_number.outputs.value }}
          name: Release ${{ inputs.version }} (${{ steps.build_number.outputs.value }})
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
