name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute build number from commit count
        id: build_number
        # +1 accounts for the pubspec update commit at the end of this workflow
        run: |
          BUILD=$(( $(git rev-list --count HEAD) + 1 ))
          echo "value=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Build number: $BUILD"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ github.workspace }}/android/app/upload-keystore.jks
          EOF

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Create firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Build APK
        run: flutter build apk --release --build-name=${{ inputs.version }} --build-number=${{ steps.build_number.outputs.value }} --dart-define=BACKEND_URL=${{ vars.BACKEND_URL }}

      - name: Build AAB
        run: flutter build appbundle --release --build-name=${{ inputs.version }} --build-number=${{ steps.build_number.outputs.value }} --dart-define=BACKEND_URL=${{ vars.BACKEND_URL }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ inputs.version }}+${{ steps.build_number.outputs.value }}
          name: Release ${{ inputs.version }} (${{ steps.build_number.outputs.value }})
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true

      - name: Update pubspec.yaml version
        run: |
          NEW_VERSION="${{ inputs.version }}+${{ steps.build_number.outputs.value }}"
          sed -i "s/^version: .*$/version: ${NEW_VERSION}/" pubspec.yaml
          git config user.name "drivstoffpriser-bot[bot]"
          git config user.email "drivstoffpriser-bot[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: release ${NEW_VERSION} [release]"
          git push
          git push origin HEAD:release
