name: Export Public Data

on:
  schedule:
    - cron: '0 6,18 * * *'  # Every 12 hours at 06:00 and 18:00 UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Export Firestore data
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/export_data.py

      - name: Commit and push
        run: |
          git config user.name "drivstoffpriser-bot[bot]"
          git config user.email "drivstoffpriser-bot[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: update public station and price data"
            git push
          fi
